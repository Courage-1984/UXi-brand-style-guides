<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Belgium Campus iTversity Calendar — Multi-Month (Jan 2026 → Jan 2027)</title>
    <style>
        :root {
            --bg: #ffffff;
            --ink: #1f1f1f;
            --grid: #dcdcdc;
            --head-bg: #1d2576;
            --head-ink: #ffffff;
            --muted: #f7f7fb;
            --holiday: #ffe8a3;
            --campus: #ffd166;
            --exam: #ffd1dd;
            --student: #efe6ff;
            --course: #e6f0ff;
            --admin: #dff3f0;
            --research: #e8f7e7;
            --event: #ffe6cc;
            --staff: #ffb3b3;
        }

        html,
        body {
            background: var(--bg);
            color: var(--ink);
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.35;
            margin: 0
        }

        .wrap {
            max-width: 1160px;
            margin: 26px auto;
            padding: 0 16px
        }

        header {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px
        }

        h1 {
            margin: 0;
            font-size: clamp(22px, 4vw, 30px)
        }

        .controls {
            display: flex;
            gap: 8px;
            align-items: center
        }

        select,
        button {
            font: inherit;
            padding: 8px 10px;
            border: 1px solid var(--grid);
            border-radius: 8px;
            background: #fff
        }

        button {
            cursor: pointer
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            margin: 10px 0 18px
        }

        .legend .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px
        }

        .legend .sw {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            outline: 1px solid #bbb
        }

        .cal {
            border: 1px solid var(--grid);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .05)
        }

        .cal .dow {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--head-bg);
            color: var(--head-ink);
            font-weight: 600;
            text-align: center;
            padding: 10px 0;
            font-size: 14px
        }

        .cal .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--bg)
        }

        .day {
            min-height: 120px;
            border-top: 1px solid var(--grid);
            border-right: 1px solid var(--grid);
            padding: 8px 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: var(--bg)
        }

        .day:nth-child(7n) {
            border-right: none
        }

        .day.blank {
            background: var(--muted)
        }

        .date {
            font-weight: 700;
            font-size: 13px;
            opacity: .75
        }

        .items {
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .tag {
            display: block;
            font-size: 12px;
            padding: 6px 7px;
            border-radius: 6px;
            background: #f5f5f5;
            border: 1px solid rgba(0, 0, 0, .06)
        }

        .tagRow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .tagText {
            flex: 1;
        }

        .detailsBtn {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 5px;
            border: 1px solid rgba(0, 0, 0, .25);
            background: #fff;
            cursor: pointer;
            flex-shrink: 0;
        }

        .modalBackdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 16px;
        }

        .modalBackdrop.open {
            display: flex;
        }

        .modal {
            background: #fff;
            width: min(780px, 100%);
            max-height: 85vh;
            border-radius: 10px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, .2);
            display: flex;
            flex-direction: column;
        }

        .modalHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--grid);
        }

        .modalTitle {
            margin: 0;
            font-size: 18px;
        }

        .modalClose {
            border: 1px solid var(--grid);
            background: #fff;
            padding: 4px 9px;
            border-radius: 6px;
            cursor: pointer;
        }

        .modalBody {
            padding: 14px;
            overflow: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.5;
        }

        .holiday {
            background: var(--holiday)
        }

        .campus {
            background: var(--campus)
        }

        .exam {
            background: var(--exam)
        }

        .student {
            background: var(--student)
        }

        .course {
            background: var(--course)
        }

        .admin {
            background: var(--admin)
        }

        .research {
            background: var(--research)
        }

        .event {
            background: var(--event)
        }

        .staff {
            background: var(--staff);
            border-color: rgba(0, 0, 0, .08)
        }

        .monthTitle {
            padding: 12px 14px;
            font-weight: 700;
            border-bottom: 1px solid var(--grid);
            background: #fafafe
        }

        @media print {

            /* Hide everything outside calendar container when embedded */
            body.bc-printing>*:not(.bc-calendar-container) {
                display: none !important;
            }

            .wrap {
                max-width: none;
                margin: 0;
                padding: 0;
            }

            .controls,
            .legend {
                display: none
            }

            /* Calendar sizing for print - ensure fits on one page */
            body.bc-printing [data-print-wrapper] .cal {
                width: 100%;
                max-width: 100%;
                margin: 0;
                padding: 0;
                page-break-after: always !important;
                page-break-inside: avoid !important;
            }

            body.bc-printing [data-print-wrapper] .monthTitle {
                padding: 8px 10px;
                font-size: 16px;
                margin: 0;
            }

            body.bc-printing [data-print-wrapper] .day {
                min-height: 60px !important;
                padding: 4px 3px 6px !important;
                font-size: 11px;
            }

            body.bc-printing [data-print-wrapper] .date {
                font-size: 11px;
                margin-bottom: 2px;
            }

            body.bc-printing [data-print-wrapper] .tag {
                font-size: 9px;
                padding: 3px 4px;
                line-height: 1.2;
                margin-bottom: 2px;
            }

            body.bc-printing [data-print-wrapper] .dow {
                padding: 6px 0;
                font-size: 11px;
            }

            body.bc-printing [data-print-wrapper] .items {
                gap: 2px;
            }

            /* Print all months styles */
            /* Hide everything by default when printing */
            body.bc-printing * {
                display: none !important;
                visibility: hidden !important;
            }

            /* Show only calendar container and its contents */
            body.bc-printing .bc-calendar-container {
                display: block !important;
                visibility: visible !important;
            }

            body.bc-printing .bc-calendar-container * {
                visibility: visible !important;
            }

            body.bc-printing .bc-calendar-container .wrap {
                display: block !important;
            }

            body.bc-printing .bc-calendar-container [data-print-wrapper] {
                display: block !important;
            }

            body.bc-printing .bc-calendar-container [data-print-wrapper] .cal {
                display: block !important;
            }

            body.bc-printing .bc-calendar-container [data-print-wrapper] .grid {
                display: grid !important;
            }

            body.bc-printing .bc-calendar-container [data-print-wrapper] .dow {
                display: grid !important;
            }

            body.bc-printing .bc-calendar-container [data-print-wrapper] .day {
                display: flex !important;
            }

            body.bc-printing .bc-calendar-container [data-print-wrapper] .items {
                display: flex !important;
            }

            body.bc-printing .bc-calendar-container [data-print-wrapper] .monthTitle,
            body.bc-printing .bc-calendar-container [data-print-wrapper] .date,
            body.bc-printing .bc-calendar-container [data-print-wrapper] .tag,
            body.bc-printing .bc-calendar-container [data-print-wrapper] .day.blank {
                display: block !important;
            }

            /* Hide specific elements inside calendar container */
            body.bc-printing .bc-calendar-container header,
            body.bc-printing .bc-calendar-container .controls,
            body.bc-printing .bc-calendar-container .legend,
            body.bc-printing .bc-calendar-container .original-cal-hidden,
            body.bc-printing .bc-calendar-container .wrap .cal:not([data-print-month]) {
                display: none !important;
            }

            body.bc-printing [data-print-wrapper] .cal {
                display: block !important;
                visibility: visible !important;
                margin-bottom: 0 !important;
            }

            body.bc-printing [data-print-wrapper] .cal:last-child {
                page-break-after: auto !important;
            }

            body.bc-printing [data-print-wrapper] .grid {
                display: grid !important;
            }

            body.bc-printing [data-print-wrapper] .dow {
                display: grid !important;
            }

            body.bc-printing [data-print-wrapper] .items {
                display: flex !important;
            }

            body.bc-printing [data-print-wrapper] .day {
                display: flex !important;
            }
        }

        /* ====== RESPONSIVE STYLES ====== */

        /* Large tablets and small desktops (768px - 1024px) */
        @media screen and (max-width: 1024px) {
            .wrap {
                max-width: 100%;
                padding: 0 12px;
                margin: 20px auto
            }

            .day {
                min-height: 110px;
                padding: 6px 6px 10px
            }

            .tag {
                font-size: 11px;
                padding: 5px 6px
            }

            .cal .dow {
                font-size: 13px;
                padding: 8px 0
            }
        }

        /* Tablets (600px - 767px) */
        @media screen and (max-width: 767px) {
            .wrap {
                padding: 0 10px;
                margin: 16px auto
            }

            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px
            }

            h1 {
                font-size: clamp(20px, 5vw, 26px);
                width: 100%
            }

            .controls {
                width: 100%;
                flex-wrap: wrap;
                gap: 6px
            }

            .controls label {
                font-size: 14px
            }

            select,
            button {
                font-size: 14px;
                padding: 7px 9px;
                flex: 1;
                min-width: 120px
            }

            .legend {
                gap: 6px 12px;
                margin: 8px 0 14px
            }

            .legend .pill {
                font-size: 11px;
                gap: 6px
            }

            .legend .sw {
                width: 12px;
                height: 12px
            }

            .cal {
                border-radius: 8px
            }

            .cal .dow {
                font-size: 12px;
                padding: 8px 4px
            }

            .cal .dow div {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap
            }

            .day {
                min-height: 100px;
                padding: 5px 4px 8px;
                gap: 4px
            }

            .date {
                font-size: 12px
            }

            .tag {
                font-size: 10px;
                padding: 4px 5px;
                line-height: 1.3
            }

            .items {
                gap: 4px
            }

            .monthTitle {
                padding: 10px 12px;
                font-size: 15px
            }
        }

        /* Small tablets and large phones (481px - 599px) */
        @media screen and (max-width: 599px) {
            .wrap {
                padding: 0 8px;
                margin: 12px auto
            }

            header {
                margin-bottom: 10px
            }

            h1 {
                font-size: clamp(18px, 6vw, 24px)
            }

            .controls {
                flex-direction: column;
                width: 100%
            }

            select,
            button {
                width: 100%;
                min-width: unset
            }

            .legend {
                gap: 5px 10px;
                margin: 6px 0 12px
            }

            .legend .pill {
                font-size: 10px
            }

            .cal .dow {
                font-size: 11px;
                padding: 6px 2px
            }

            .cal .dow div {
                padding: 0 2px
            }

            .day {
                min-height: 90px;
                padding: 4px 3px 6px;
                gap: 3px
            }

            .date {
                font-size: 11px
            }

            .tag {
                font-size: 9px;
                padding: 3px 4px;
                line-height: 1.25;
                word-break: break-word;
                overflow-wrap: break-word
            }

            .items {
                gap: 3px
            }

            .monthTitle {
                padding: 8px 10px;
                font-size: 14px
            }
        }

        /* Small phones (320px - 480px) */
        @media screen and (max-width: 480px) {
            .wrap {
                padding: 0 6px;
                margin: 10px auto
            }

            html,
            body {
                font-size: 14px
            }

            header {
                margin-bottom: 8px;
                gap: 8px
            }

            h1 {
                font-size: clamp(16px, 7vw, 22px);
                line-height: 1.2
            }

            .controls {
                gap: 5px
            }

            select,
            button {
                font-size: 13px;
                padding: 6px 8px
            }

            .legend {
                gap: 4px 8px;
                margin: 5px 0 10px
            }

            .legend .pill {
                font-size: 9px;
                gap: 4px;
                flex-wrap: wrap
            }

            .legend .sw {
                width: 10px;
                height: 10px;
                flex-shrink: 0
            }

            .cal {
                border-radius: 6px;
                border-width: 1px
            }

            .cal .dow {
                font-size: 10px;
                padding: 5px 1px;
                font-weight: 600
            }

            .cal .dow div {
                padding: 0 1px;
                font-size: 9px
            }

            .day {
                min-height: 80px;
                padding: 3px 2px 5px;
                gap: 2px;
                border-top-width: 1px;
                border-right-width: 1px
            }

            .date {
                font-size: 10px;
                font-weight: 600
            }

            .tag {
                font-size: 8px;
                padding: 2px 3px;
                line-height: 1.2;
                border-radius: 4px;
                word-break: break-word;
                overflow-wrap: break-word;
                hyphens: auto
            }

            .items {
                gap: 2px;
                overflow: hidden
            }

            .monthTitle {
                padding: 6px 8px;
                font-size: 13px;
                font-weight: 600
            }
        }

        /* Extra small phones (max-width: 320px) */
        @media screen and (max-width: 320px) {
            .wrap {
                padding: 0 4px;
                margin: 8px auto
            }

            html,
            body {
                font-size: 13px
            }

            h1 {
                font-size: clamp(14px, 8vw, 20px)
            }

            .controls select,
            .controls button {
                font-size: 12px;
                padding: 5px 6px
            }

            .legend .pill {
                font-size: 8px
            }

            .legend .sw {
                width: 9px;
                height: 9px
            }

            .cal .dow {
                font-size: 9px;
                padding: 4px 0
            }

            .cal .dow div {
                font-size: 8px
            }

            .day {
                min-height: 75px;
                padding: 2px 1px 4px
            }

            .date {
                font-size: 9px
            }

            .tag {
                font-size: 7px;
                padding: 2px;
                line-height: 1.15
            }

            .monthTitle {
                padding: 5px 6px;
                font-size: 12px
            }
        }

        /* Landscape orientation adjustments for phones */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .day {
                min-height: 60px
            }

            .tag {
                font-size: 9px;
                padding: 2px 3px
            }

            .monthTitle {
                padding: 6px 10px
            }
        }

        /* High DPI displays */
        @media screen and (-webkit-min-device-pixel-ratio: 2),
        screen and (min-resolution: 192dpi) {
            .cal {
                border-width: 0.5px
            }

            .day {
                border-top-width: 0.5px;
                border-right-width: 0.5px
            }
        }

        /* Touch device optimizations */
        @media (hover: none) and (pointer: coarse) {

            select,
            button {
                min-height: 44px;
                padding: 10px 12px
            }

            .tag {
                min-height: 32px;
                display: flex;
                align-items: center
            }
        }
    </style>
</head>

<body>
    <div class="bc-calendar-container">
        <div class="wrap">
            <header>
                <h1 id="title">Belgium Campus iTversity Calendar</h1>
                <div class="controls">
                    <label for="monthSel">Month:</label>
                    <select id="monthSel" aria-label="Select month"></select>
                    <button id="printBtn" title="Print all months">Print All Months</button>
                </div>
            </header>

            <div class="legend">
                <span class="pill"><span class="sw" style="background:var(--holiday)"></span>Public/Student
                    holidays</span>
                <span class="pill"><span class="sw" style="background:var(--campus)"></span>Campus closed</span>
                <span class="pill"><span class="sw" style="background:var(--exam)"></span>(Re)Exams & Perusals</span>
                <span class="pill"><span class="sw" style="background:var(--course)"></span>Maths bridging course</span>
                <span class="pill"><span class="sw" style="background:var(--admin)"></span>Admin / schedules</span>
                <span class="pill"><span class="sw" style="background:var(--research)"></span>Dissertation
                    (final)</span>
                <span class="pill"><span class="sw" style="background:var(--event)"></span>Events</span>
                <span class="pill"><span class="sw" style="background:var(--staff)"></span>Staff-only tasks (new)</span>
            </div>

            <div id="calendar" class="cal" role="region" aria-live="polite"></div>
        </div>
    </div>

    <script>

        /* ====== MONTH SELECTOR ====== */
        const monthKeys = Object.keys(eventsByMonth);
        const monthLabels = {
            "2026-01": "January 2026", "2026-02": "February 2026", "2026-03": "March 2026", "2026-04": "April 2026",
            "2026-05": "May 2026", "2026-06": "June 2026", "2026-07": "July 2026", "2026-08": "August 2026",
            "2026-09": "September 2026", "2026-10": "October 2026", "2026-11": "November 2026", "2026-12": "December 2026",
            "2027-01": "January 2027"
        };

        /* ====== UTILITIES (LOCAL TIME — NO UTC) ====== */
        const pad = n => String(n).padStart(2, "0");
        function fmtLocal(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }
        function eachDay(startStr, endStr) {
            const [ys, ms, ds] = startStr.split("-").map(Number);
            const [ye, me, de] = (endStr ?? startStr).split("-").map(Number);
            const s = new Date(ys, ms - 1, ds);  // local midnight
            const e = new Date(ye, me - 1, de);
            const out = [];
            for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
                out.push(fmtLocal(d));
            }
            return out;
        }
        function expand(events) {
            const map = {};
            for (const ev of events) {
                const days = eachDay(ev.start, ev.end);
                for (const day of days) {
                    (map[day] ||= []).push({ title: ev.title, category: ev.category, details: ev.details });
                }
            }
            return map;
        }
        function daysInMonth(yyyy, mm) { return new Date(yyyy, mm, 0).getDate(); }
        function firstDow(yyyy, mm) { return new Date(yyyy, mm - 1, 1).getDay(); }

        /* ====== RENDERING ====== */
        const monthSel = document.getElementById('monthSel');
        const calEl = document.getElementById('calendar');
        const titleEl = document.getElementById('title');
        const printBtn = document.getElementById('printBtn');
        const modalBackdrop = document.createElement('div');
        modalBackdrop.className = 'modalBackdrop';
        modalBackdrop.innerHTML = `
            <div class="modal" role="dialog" aria-modal="true" aria-labelledby="eventModalTitle">
                <div class="modalHeader">
                    <h2 class="modalTitle" id="eventModalTitle"></h2>
                    <button type="button" class="modalClose" aria-label="Close details modal">Close</button>
                </div>
                <div class="modalBody" id="eventModalBody"></div>
            </div>
        `;
        document.body.appendChild(modalBackdrop);
        const eventModalTitle = modalBackdrop.querySelector('#eventModalTitle');
        const eventModalBody = modalBackdrop.querySelector('#eventModalBody');
        const modalCloseBtn = modalBackdrop.querySelector('.modalClose');

        function openDetailsModal(title, details) {
            eventModalTitle.textContent = title;
            eventModalBody.innerHTML = formatDetails(details || '');
            modalBackdrop.classList.add('open');
        }

        function formatDetails(detailsText) {
            const escapeHtml = (text) => text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');

            const escaped = escapeHtml(detailsText);
            const withLinks = escaped.replace(/(https?:\/\/[^\s<]+|www\.[^\s<]+)/g, (match) => {
                const href = match.startsWith('www.') ? `https://${match}` : match;
                return `<a href="${href}" target="_blank" rel="noopener noreferrer">${match}</a>`;
            });
            return withLinks.replace(/\n/g, '<br>');
        }

        function closeDetailsModal() {
            modalBackdrop.classList.remove('open');
        }

        modalCloseBtn.addEventListener('click', closeDetailsModal);
        modalBackdrop.addEventListener('click', (event) => {
            if (event.target === modalBackdrop) {
                closeDetailsModal();
            }
        });
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && modalBackdrop.classList.contains('open')) {
                closeDetailsModal();
            }
        });

        monthKeys.forEach(k => {
            const opt = document.createElement('option');
            opt.value = k; opt.textContent = monthLabels[k] || k;
            monthSel.appendChild(opt);
        });
        const today = new Date();
        const currentMonthKey = `${today.getFullYear()}-${pad(today.getMonth() + 1)}`;
        monthSel.value = monthKeys.includes(currentMonthKey) ? currentMonthKey : monthKeys[0];

        function render(monthKey) {
            const [y, m] = monthKey.split('-').map(Number);
            titleEl.textContent = `Belgium Campus iTversity Calendar — ${monthLabels[monthKey] || monthKey}`;

            const events = eventsByMonth[monthKey] || [];
            const byDate = expand(events);

            const total = daysInMonth(y, m);
            const startBlank = firstDow(y, m);

            calEl.innerHTML = `
    <div class="monthTitle">${monthLabels[monthKey] || monthKey}</div>
    <div class="dow"><div>Sunday</div><div>Monday</div><div>Tuesday</div><div>Wednesday</div><div>Thursday</div><div>Friday</div><div>Saturday</div></div>
    <div class="grid"></div>
  `;
            const grid = calEl.querySelector('.grid');

            for (let i = 0; i < startBlank; i++) {
                const d = document.createElement('div'); d.className = 'day blank'; grid.appendChild(d);
            }
            for (let day = 1; day <= total; day++) {
                const cell = document.createElement('div'); cell.className = 'day';
                cell.innerHTML = `<div class="date">${day}</div><div class="items"></div>`;
                const itemsEl = cell.querySelector('.items');
                const dateStr = `${y}-${pad(m)}-${pad(day)}`;

                (byDate[dateStr] || []).forEach(item => {
                    const tag = document.createElement('div');
                    tag.className = `tag ${item.category || ''}`;
                    if (item.details) {
                        const row = document.createElement('div');
                        row.className = 'tagRow';

                        const text = document.createElement('span');
                        text.className = 'tagText';
                        text.textContent = item.title;

                        const detailsBtn = document.createElement('button');
                        detailsBtn.type = 'button';
                        detailsBtn.className = 'detailsBtn';
                        detailsBtn.textContent = 'Details';
                        detailsBtn.addEventListener('click', () => openDetailsModal(item.title, item.details));

                        row.appendChild(text);
                        row.appendChild(detailsBtn);
                        tag.appendChild(row);
                    } else {
                        tag.textContent = item.title;
                    }
                    itemsEl.appendChild(tag);
                });
                grid.appendChild(cell);
            }
        }

        monthSel.addEventListener('change', e => render(e.target.value));

        /* ====== PRINT ALL MONTHS FUNCTIONALITY ====== */
        function renderMonthForPrint(monthKey) {
            const [y, m] = monthKey.split('-').map(Number);
            const events = eventsByMonth[monthKey] || [];
            const byDate = expand(events);
            const total = daysInMonth(y, m);
            const startBlank = firstDow(y, m);

            const calDiv = document.createElement('div');
            calDiv.className = 'cal';
            calDiv.setAttribute('data-print-month', 'true');

            calDiv.innerHTML = `
                <div class="monthTitle">${monthLabels[monthKey] || monthKey}</div>
                <div class="dow"><div>Sunday</div><div>Monday</div><div>Tuesday</div><div>Wednesday</div><div>Thursday</div><div>Friday</div><div>Saturday</div></div>
                <div class="grid"></div>
            `;

            const grid = calDiv.querySelector('.grid');

            for (let i = 0; i < startBlank; i++) {
                const d = document.createElement('div');
                d.className = 'day blank';
                grid.appendChild(d);
            }

            for (let day = 1; day <= total; day++) {
                const cell = document.createElement('div');
                cell.className = 'day';
                cell.innerHTML = `<div class="date">${day}</div><div class="items"></div>`;
                const itemsEl = cell.querySelector('.items');
                const dateStr = `${y}-${pad(m)}-${pad(day)}`;

                (byDate[dateStr] || []).forEach(item => {
                    const tag = document.createElement('span');
                    tag.className = `tag ${item.category || ''}`;
                    tag.textContent = item.title;
                    itemsEl.appendChild(tag);
                });
                grid.appendChild(cell);
            }

            return calDiv;
        }

        printBtn.addEventListener('click', () => {
            // Store original state
            const originalMonth = monthSel.value;
            const calendarContainer = document.querySelector('.bc-calendar-container');
            const wrap = document.querySelector('.wrap');
            const body = document.body;

            // Create print wrapper
            const printWrapper = document.createElement('div');
            printWrapper.setAttribute('data-print-wrapper', 'true');
            printWrapper.className = 'print-wrapper';

            // Generate all months
            monthKeys.forEach(monthKey => {
                const monthCal = renderMonthForPrint(monthKey);
                printWrapper.appendChild(monthCal);
            });

            // Append print wrapper inside calendar container (preferred) or wrap
            // Always try to put it inside calendar container first
            let appendTarget = calendarContainer;
            if (!appendTarget) {
                appendTarget = wrap;
            }
            if (!appendTarget) {
                appendTarget = body;
            }
            appendTarget.appendChild(printWrapper);

            // Ensure print wrapper is visible
            printWrapper.style.setProperty('display', 'block', 'important');
            printWrapper.style.setProperty('visibility', 'visible', 'important');

            // Hide original calendar
            const originalCal = document.getElementById('calendar');
            if (originalCal) {
                originalCal.classList.add('original-cal-hidden');
                originalCal.style.display = 'none';
            }

            // Hide controls and legend
            const controls = document.querySelector('.controls');
            const legend = document.querySelector('.legend');
            if (controls) controls.style.display = 'none';
            if (legend) legend.style.display = 'none';

            // Hide content outside calendar container (for embedded scenarios)
            const hiddenElements = [];
            if (calendarContainer) {
                // Find top-level container
                let topContainer = calendarContainer;
                let depth = 0;
                while (topContainer && topContainer.parentNode !== body && depth < 10) {
                    topContainer = topContainer.parentNode;
                    depth++;
                }

                // Ensure calendar container and all its parents are visible
                let current = calendarContainer;
                while (current && current !== body) {
                    current.style.setProperty('display', 'block', 'important');
                    current.style.setProperty('visibility', 'visible', 'important');
                    current = current.parentNode;
                }

                // Hide all body children except the calendar container tree
                if (topContainer) {
                    Array.from(body.children).forEach(el => {
                        if (el !== topContainer && !topContainer.contains(el) && !el.contains(topContainer)) {
                            const originalDisplay = window.getComputedStyle(el).display;
                            el.style.setProperty('display', 'none', 'important');
                            hiddenElements.push({ el, originalDisplay });
                        }
                    });
                }

                // Also hide common WordPress elements that might be siblings
                const wpSelectors = [
                    'header:not(.bc-calendar-container header)',
                    'footer:not(.bc-calendar-container footer)',
                    'nav:not(.bc-calendar-container nav)',
                    '.site-header:not(.bc-calendar-container .site-header)',
                    '.site-footer:not(.bc-calendar-container .site-footer)',
                    '.main-navigation:not(.bc-calendar-container .main-navigation)',
                    '.wp-block-group:not(.bc-calendar-container .wp-block-group)',
                    '.entry-header:not(.bc-calendar-container .entry-header)',
                    '.entry-footer:not(.bc-calendar-container .entry-footer)'
                ];

                wpSelectors.forEach(selector => {
                    try {
                        document.querySelectorAll(selector).forEach(el => {
                            if (!calendarContainer.contains(el) && !el.contains(calendarContainer)) {
                                const originalDisplay = window.getComputedStyle(el).display;
                                el.style.setProperty('display', 'none', 'important');
                                hiddenElements.push({ el, originalDisplay });
                            }
                        });
                    } catch (e) {
                        // Ignore selector errors
                    }
                });
            }

            // Add printing class to body
            body.classList.add('bc-printing');

            // Apply inline styles recursively to ensure visibility
            const applyStyles = (element) => {
                element.style.setProperty('visibility', 'visible', 'important');

                // Special handling for grid elements
                if (element.classList.contains('grid') || element.classList.contains('dow')) {
                    element.style.setProperty('display', 'grid', 'important');
                }
                // Special handling for flex elements
                else if (element.classList.contains('items') || element.classList.contains('day')) {
                    element.style.setProperty('display', 'flex', 'important');
                }
                // Default to block
                else {
                    element.style.setProperty('display', 'block', 'important');
                }

                Array.from(element.children).forEach(child => applyStyles(child));
            };

            applyStyles(printWrapper);

            // Inject dynamic print styles if needed
            const styleId = 'bc-print-styles';
            let printStyle = document.getElementById(styleId);
            if (!printStyle) {
                printStyle = document.createElement('style');
                printStyle.id = styleId;
                printStyle.textContent = `
                    @media print {
                        /* Hide everything by default when printing */
                        body.bc-printing * {
                            display: none !important;
                            visibility: hidden !important;
                        }
                        /* Show only calendar container and its contents */
                        body.bc-printing .bc-calendar-container {
                            display: block !important;
                            visibility: visible !important;
                        }
                        body.bc-printing .bc-calendar-container * {
                            visibility: visible !important;
                        }
                        body.bc-printing .bc-calendar-container .wrap {
                            display: block !important;
                        }
                        body.bc-printing .bc-calendar-container [data-print-wrapper] {
                            display: block !important;
                        }
                        body.bc-printing .bc-calendar-container [data-print-wrapper] .cal {
                            display: block !important;
                        }
                        body.bc-printing .bc-calendar-container [data-print-wrapper] .grid {
                            display: grid !important;
                        }
                        body.bc-printing .bc-calendar-container [data-print-wrapper] .dow {
                            display: grid !important;
                        }
                        body.bc-printing .bc-calendar-container [data-print-wrapper] .day {
                            display: flex !important;
                        }
                        body.bc-printing .bc-calendar-container [data-print-wrapper] .items {
                            display: flex !important;
                        }
                        body.bc-printing .bc-calendar-container [data-print-wrapper] .monthTitle,
                        body.bc-printing .bc-calendar-container [data-print-wrapper] .date,
                        body.bc-printing .bc-calendar-container [data-print-wrapper] .tag,
                        body.bc-printing .bc-calendar-container [data-print-wrapper] .day.blank {
                            display: block !important;
                        }
                        /* Hide specific elements inside calendar container */
                        body.bc-printing .bc-calendar-container header,
                        body.bc-printing .bc-calendar-container .controls,
                        body.bc-printing .bc-calendar-container .legend,
                        body.bc-printing .bc-calendar-container .original-cal-hidden,
                        body.bc-printing .bc-calendar-container .wrap .cal:not([data-print-month]) {
                            display: none !important;
                        }
                        body.bc-printing .bc-calendar-container .wrap {
                            margin: 0 !important;
                            padding: 0 !important;
                        }
                        body.bc-printing [data-print-wrapper] .cal {
                            display: block !important;
                            visibility: visible !important;
                            width: 100% !important;
                            max-width: 100% !important;
                            margin: 0 !important;
                            padding: 0 !important;
                            page-break-after: always !important;
                            page-break-inside: avoid !important;
                        }
                        body.bc-printing [data-print-wrapper] .cal:last-child {
                            page-break-after: auto !important;
                        }
                        body.bc-printing [data-print-wrapper] .monthTitle {
                            padding: 8px 10px !important;
                            font-size: 16px !important;
                            margin: 0 !important;
                        }
                        body.bc-printing [data-print-wrapper] .day {
                            display: flex !important;
                            min-height: 60px !important;
                            padding: 4px 3px 6px !important;
                            font-size: 11px !important;
                        }
                        body.bc-printing [data-print-wrapper] .date {
                            font-size: 11px !important;
                            margin-bottom: 2px !important;
                        }
                        body.bc-printing [data-print-wrapper] .tag {
                            font-size: 9px !important;
                            padding: 3px 4px !important;
                            line-height: 1.2 !important;
                            margin-bottom: 2px !important;
                        }
                        body.bc-printing [data-print-wrapper] .dow {
                            display: grid !important;
                            padding: 6px 0 !important;
                            font-size: 11px !important;
                        }
                        body.bc-printing [data-print-wrapper] .grid {
                            display: grid !important;
                        }
                        body.bc-printing [data-print-wrapper] .items {
                            display: flex !important;
                            gap: 2px !important;
                        }
                    }
                `;
                document.head.appendChild(printStyle);
            }

            // Cleanup function
            const cleanup = () => {
                // Remove print wrapper
                if (printWrapper.parentNode) {
                    printWrapper.parentNode.removeChild(printWrapper);
                }

                // Remove print styles
                if (printStyle && printStyle.parentNode) {
                    printStyle.parentNode.removeChild(printStyle);
                }

                // Restore hidden elements (for embedded scenarios)
                hiddenElements.forEach(({ el, originalDisplay }) => {
                    el.style.display = originalDisplay;
                });

                // Restore original calendar
                if (originalCal) {
                    originalCal.classList.remove('original-cal-hidden');
                    originalCal.style.display = '';
                }

                // Restore controls and legend
                if (controls) controls.style.display = '';
                if (legend) legend.style.display = '';

                // Remove printing class
                body.classList.remove('bc-printing');

                // Re-render original month
                render(originalMonth);
            };

            // Handle afterprint event
            window.addEventListener('afterprint', cleanup, { once: true });

            // Fallback timeout (in case afterprint doesn't fire)
            setTimeout(() => {
                if (body.classList.contains('bc-printing')) {
                    cleanup();
                }
            }, 1000);

            // Small delay to ensure DOM is updated before printing
            setTimeout(() => {
                window.print();
            }, 100);
        });

        render(monthSel.value);
    </script>
