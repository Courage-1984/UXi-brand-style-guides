<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OWU 2026 Calendar of Events</title>
    <!-- Cooper Hewitt (OWU brand font) via jsDelivr/@fontsource -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cooper-hewitt@5.2.5/400.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cooper-hewitt@5.2.5/700.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cooper-hewitt@5.2.5/800.css" />
    <style>
        /* ============================================
           CONFIGURATION: Color Scheme
           ============================================ */
        :root {
            /* Base colors */
            --bg: #ffffff;
            --ink: #403f3f;
            --grid: rgba(205, 202, 48, .35);
            /* #cdca30 */
            --head-bg: #002558;
            --head-ink: #ffffff;
            --muted: rgba(248, 183, 23, .12);
            /* #f8b717 */

            /* OWU 2026 Calendar Key colors */
            --campus: #53bf9d;   /* Campus Life (Events & Wellness) */
            --holiday: #ee2979;  /* Public Holidays (Campus Closed) */
            --workshop: #cdca30; /* Workshops */
            --openday: #ff8949;  /* Open Days */
            --micro: #002558;    /* Micro Credential Courses */
            --academic: #f8b717; /* Academic (Intakes & Institutional Dates) */
        }

        html,
        body {
            background: var(--bg);
            color: var(--ink);
            font-family: "Cooper Hewitt", system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.35;
            margin: 0
        }

        .wrap {
            max-width: 1160px;
            margin: 26px auto;
            padding: 0 16px
        }

        header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px
        }

        .brandLogo {
            height: 44px;
            width: auto;
            display: none;
            object-fit: contain;
        }

        @media screen and (max-width: 599px) {
            .brandLogo {
                height: 36px;
            }
        }

        h1 {
            margin: 0;
            font-size: clamp(22px, 4vw, 30px)
        }

        header h1#title {
            justify-self: center;
            text-align: center;
            color: var(--head-bg);
            font-weight: 800;
            letter-spacing: .2px;
            line-height: 1.15;
        }

        .controls {
            display: flex;
            gap: 8px;
            align-items: center
        }

        select,
        button {
            font: inherit;
            padding: 8px 10px;
            border: 1px solid var(--grid);
            border-radius: 8px;
            background: #fff;
            color: var(--head-bg);
            -webkit-text-fill-color: var(--head-bg)
        }

        button {
            cursor: pointer
        }

        /* Prevent WordPress theme button/input colors from overriding control text */
        .calendar-container .controls select,
        .calendar-container .controls button {
            color: var(--head-bg) !important;
            -webkit-text-fill-color: var(--head-bg) !important;
            background-color: #fff !important;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            margin: 10px 0 18px
        }

        .legend .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 750;
            color: var(--head-bg);
            white-space: nowrap;
            flex-shrink: 0
        }

        .legend .sw {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            outline: 1px solid rgba(205, 202, 48, .9);
            /* #cdca30 */
            flex-shrink: 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact
        }

        .cal {
            border: 1px solid var(--grid);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .05)
        }

        .cal .dow {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: #53bf9d; /* OWU brand landscape accent */
            color: var(--head-ink);
            font-weight: 600;
            text-align: center;
            padding: 10px 0;
            font-size: 14px
        }

        .cal .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--bg)
        }

        .day {
            min-height: 120px;
            border-top: 1px solid var(--grid);
            border-right: 1px solid var(--grid);
            padding: 8px 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: var(--bg)
        }

        .day:nth-child(7n) {
            border-right: none
        }

        .day.blank {
            background: var(--muted)
        }

        .date {
            font-weight: 700;
            font-size: 13px;
            opacity: .9;
            color: var(--head-bg)
        }

        .items {
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .tag {
            display: block;
            font-size: 13px;
            padding: 6px 7px;
            border-radius: 6px;
            background: #f5f5f5;
            border: 1px solid rgba(0, 37, 88, .22);
            /* #002558 */
            color: var(--ink);
            line-height: 1.25;
            font-weight: 650;
        }

        /* Long-text handling: show truncated summary inside the tag,
           and a small "Details" button that opens a modal. */
        .moreBtn {
            display: block;
            margin-top: 6px;
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 6px;
            border: 1px solid rgba(0, 37, 88, .28);
            /* #002558 */
            background: rgba(248, 183, 23, .22);
            /* #f8b717 */
            cursor: pointer;
        }

        /* OWU 2026 event category styles */
        .campus {
            background: var(--campus);
            color: #002558;
        }

        .holiday {
            background: var(--holiday);
            color: #ffffff;
            border-color: rgba(0, 37, 88, .35);
        }

        .workshop {
            background: var(--workshop);
            color: #002558;
        }

        .openday {
            background: var(--openday);
            color: #ffffff;
            border-color: rgba(0, 37, 88, .35);
        }

        .micro {
            background: var(--micro);
            color: #ffffff;
            border-color: rgba(255, 255, 255, .35);
        }

        .academic {
            background: var(--academic);
            color: #002558;
        }

        .monthTitle {
            padding: 12px 14px;
            font-weight: 700;
            border-bottom: 1px solid var(--grid);
            background: rgba(83, 191, 157, .10);
            /* #53bf9d */
        }

        /* Modal for showing full event text */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 9999;
        }

        .modal[aria-hidden="false"] {
            display: flex;
        }

        .modal-content {
            width: 100%;
            max-width: 860px;
            background: #fff;
            border: 1px solid rgba(0, 37, 88, .20);
            /* #002558 */
            border-radius: 14px;
            box-shadow: 0 14px 60px rgba(0, 0, 0, .25);
            padding: 16px 16px 14px;
        }

        .modal-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .modal-title {
            font-weight: 800;
            font-size: 16px;
            line-height: 1.2;
        }

        .modal-close {
            border: 1px solid rgba(238, 41, 121, .35);
            /* #ee2979 */
            background: #fff;
            border-radius: 10px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
        }

        .modal-body {
            white-space: pre-wrap;
            line-height: 1.35;
        }

        @media print {

            /* Ensure colors print */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* Hide everything outside calendar container when embedded */
            body.calendar-printing>*:not(.calendar-container) {
                display: none !important;
            }

            .wrap {
                max-width: none;
                margin: 0;
                padding: 0;
            }

            /* Print: keep the calendar readable; modal and Details buttons are not needed */
            .modal,
            .moreBtn {
                display: none !important;
            }

            .controls {
                display: none
            }

            /* Show legend in print */
            body.calendar-printing .calendar-container .legend {
                display: flex !important;
                visibility: visible !important;
                page-break-inside: avoid !important;
                margin-bottom: 12px !important;
                padding: 8px 0 !important;
                border-bottom: 1px solid var(--grid) !important;
            }

            body.calendar-printing .calendar-container .legend .pill {
                font-size: 11px !important;
                gap: 6px !important;
                white-space: nowrap !important;
                flex-shrink: 0 !important;
            }

            body.calendar-printing .calendar-container .legend .sw {
                width: 12px !important;
                height: 12px !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                flex-shrink: 0 !important;
            }

            /* Calendar sizing for print - ensure fits on one page */
            body.calendar-printing [data-print-wrapper] .cal {
                width: 100%;
                max-width: 100%;
                margin: 0;
                padding: 0;
                page-break-after: always !important;
                page-break-inside: avoid !important;
            }

            body.calendar-printing [data-print-wrapper] .monthTitle {
                padding: 8px 10px;
                font-size: 16px;
                margin: 0;
            }

            body.calendar-printing [data-print-wrapper] .day {
                min-height: 60px !important;
                padding: 4px 3px 6px !important;
                font-size: 11px;
            }

            body.calendar-printing [data-print-wrapper] .date {
                font-size: 11px;
                margin-bottom: 2px;
            }

            body.calendar-printing [data-print-wrapper] .tag {
                font-size: 9px;
                padding: 3px 4px;
                line-height: 1.2;
                margin-bottom: 2px;
            }

            body.calendar-printing [data-print-wrapper] .dow {
                padding: 6px 0;
                font-size: 11px;
            }

            body.calendar-printing [data-print-wrapper] .items {
                gap: 2px;
            }

            /* Print all months styles */
            body.calendar-printing * {
                display: none !important;
                visibility: hidden !important;
            }

            body.calendar-printing .calendar-container {
                display: block !important;
                visibility: visible !important;
            }

            body.calendar-printing .calendar-container * {
                visibility: visible !important;
            }

            body.calendar-printing .calendar-container .wrap {
                display: block !important;
            }

            body.calendar-printing .calendar-container [data-print-wrapper] {
                display: block !important;
            }

            body.calendar-printing .calendar-container [data-print-wrapper] .cal {
                display: block !important;
            }

            body.calendar-printing .calendar-container [data-print-wrapper] .grid {
                display: grid !important;
            }

            body.calendar-printing .calendar-container [data-print-wrapper] .dow {
                display: grid !important;
            }

            body.calendar-printing .calendar-container [data-print-wrapper] .day {
                display: flex !important;
            }

            body.calendar-printing .calendar-container [data-print-wrapper] .items {
                display: flex !important;
            }

            /* Show legend in print wrapper */
            body.calendar-printing .calendar-container [data-print-wrapper] [data-print-legend] {
                display: flex !important;
                visibility: visible !important;
                page-break-inside: avoid !important;
                margin-bottom: 12px !important;
                padding: 8px 0 !important;
                border-bottom: 1px solid var(--grid) !important;
            }

            body.calendar-printing .calendar-container [data-print-wrapper] [data-print-legend] .pill {
                font-size: 10px !important;
                gap: 6px !important;
                white-space: nowrap !important;
                flex-shrink: 0 !important;
            }

            body.calendar-printing .calendar-container [data-print-wrapper] [data-print-legend] .sw {
                width: 12px !important;
                height: 12px !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                flex-shrink: 0 !important;
            }

            body.calendar-printing .calendar-container [data-print-wrapper] .monthTitle,
            body.calendar-printing .calendar-container [data-print-wrapper] .date,
            body.calendar-printing .calendar-container [data-print-wrapper] .tag,
            body.calendar-printing .calendar-container [data-print-wrapper] .day.blank {
                display: block !important;
            }

            body.calendar-printing .calendar-container header,
            body.calendar-printing .calendar-container .controls,
            body.calendar-printing .calendar-container .original-cal-hidden,
            body.calendar-printing .calendar-container .wrap .cal:not([data-print-month]) {
                display: none !important;
            }

            /* Ensure legend colors and event tag colors print correctly */
            body.calendar-printing .calendar-container .legend .sw,
            body.calendar-printing .calendar-container [data-print-wrapper] [data-print-legend] .sw {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            body.calendar-printing .calendar-container [data-print-wrapper] .tag {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }

        /* ====== RESPONSIVE STYLES ====== */

        /* Large tablets and small desktops (768px - 1024px) */
        @media screen and (max-width: 1024px) {
            .wrap {
                max-width: 100%;
                padding: 0 12px;
                margin: 20px auto
            }

            .day {
                min-height: 110px;
                padding: 6px 6px 10px
            }

            .tag {
                font-size: 11px;
                padding: 5px 6px
            }

            .cal .dow {
                font-size: 13px;
                padding: 8px 0
            }
        }

        /* Tablets (600px - 767px) */
        @media screen and (max-width: 767px) {
            .wrap {
                padding: 0 10px;
                margin: 16px auto
            }

            header {
                grid-template-columns: 1fr;
                justify-items: center;
                gap: 10px
            }

            h1 {
                font-size: clamp(20px, 5vw, 26px);
                width: 100%
            }

            .controls {
                width: 100%;
                flex-wrap: wrap;
                gap: 6px
            }

            .controls label {
                font-size: 14px
            }

            select,
            button {
                font-size: 14px;
                padding: 7px 9px;
                flex: 1;
                min-width: 120px
            }

            .legend {
                gap: 6px 12px;
                margin: 8px 0 14px
            }

            .legend .pill {
                font-size: 12px;
                gap: 6px
            }

            .legend .sw {
                width: 12px;
                height: 12px
            }

            .cal {
                border-radius: 8px
            }

            .cal .dow {
                font-size: 12px;
                padding: 8px 4px
            }

            .cal .dow div {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap
            }

            .day {
                min-height: 100px;
                padding: 5px 4px 8px;
                gap: 4px
            }

            .date {
                font-size: 12px
            }

            .tag {
                font-size: 11px;
                padding: 4px 5px;
                line-height: 1.3
            }

            .items {
                gap: 4px
            }

            .monthTitle {
                padding: 10px 12px;
                font-size: 15px
            }
        }

        /* Small tablets and large phones (481px - 599px) */
        @media screen and (max-width: 599px) {
            .wrap {
                padding: 0 8px;
                margin: 12px auto
            }

            header {
                margin-bottom: 10px
            }

            h1 {
                font-size: clamp(18px, 6vw, 24px)
            }

            .controls {
                flex-direction: column;
                width: 100%
            }

            select,
            button {
                width: 100%;
                min-width: unset
            }

            .legend {
                gap: 5px 10px;
                margin: 6px 0 12px
            }

            .legend .pill {
                font-size: 10px
            }

            .cal .dow {
                font-size: 11px;
                padding: 6px 2px
            }

            .cal .dow div {
                padding: 0 2px
            }

            .day {
                min-height: 90px;
                padding: 4px 3px 6px;
                gap: 3px
            }

            .date {
                font-size: 11px
            }

            .tag {
                font-size: 9px;
                padding: 3px 4px;
                line-height: 1.25;
                word-break: break-word;
                overflow-wrap: break-word
            }

            .items {
                gap: 3px
            }

            .monthTitle {
                padding: 8px 10px;
                font-size: 14px
            }
        }

        /* Small phones (320px - 480px) */
        @media screen and (max-width: 480px) {
            .wrap {
                padding: 0 6px;
                margin: 10px auto
            }

            html,
            body {
                font-size: 14px
            }

            header {
                margin-bottom: 8px;
                gap: 8px
            }

            h1 {
                font-size: clamp(16px, 7vw, 22px);
                line-height: 1.2
            }

            .controls {
                gap: 5px
            }

            select,
            button {
                font-size: 13px;
                padding: 6px 8px
            }

            .legend {
                gap: 4px 8px;
                margin: 5px 0 10px
            }

            .legend .pill {
                font-size: 9px;
                gap: 4px;
                flex-wrap: wrap
            }

            .legend .sw {
                width: 10px;
                height: 10px;
                flex-shrink: 0
            }

            .cal {
                border-radius: 6px;
                border-width: 1px
            }

            .cal .dow {
                font-size: 10px;
                padding: 5px 1px;
                font-weight: 600
            }

            .cal .dow div {
                padding: 0 1px;
                font-size: 9px
            }

            .day {
                min-height: 80px;
                padding: 3px 2px 5px;
                gap: 2px;
                border-top-width: 1px;
                border-right-width: 1px
            }

            .date {
                font-size: 10px;
                font-weight: 600
            }

            .tag {
                font-size: 8px;
                padding: 2px 3px;
                line-height: 1.2;
                border-radius: 4px;
                word-break: break-word;
                overflow-wrap: break-word;
                hyphens: auto
            }

            .items {
                gap: 2px;
                overflow: hidden
            }

            .monthTitle {
                padding: 6px 8px;
                font-size: 13px;
                font-weight: 600
            }
        }

        /* Extra small phones (max-width: 320px) */
        @media screen and (max-width: 320px) {
            .wrap {
                padding: 0 4px;
                margin: 8px auto
            }

            html,
            body {
                font-size: 13px
            }

            h1 {
                font-size: clamp(14px, 8vw, 20px)
            }

            .controls select,
            .controls button {
                font-size: 12px;
                padding: 5px 6px
            }

            .legend .pill {
                font-size: 8px
            }

            .legend .sw {
                width: 9px;
                height: 9px
            }

            .cal .dow {
                font-size: 9px;
                padding: 4px 0
            }

            .cal .dow div {
                font-size: 8px
            }

            .day {
                min-height: 75px;
                padding: 2px 1px 4px
            }

            .date {
                font-size: 9px
            }

            .tag {
                font-size: 7px;
                padding: 2px;
                line-height: 1.15
            }

            .monthTitle {
                padding: 5px 6px;
                font-size: 12px
            }
        }

        /* Landscape orientation adjustments for phones */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .day {
                min-height: 60px
            }

            .tag {
                font-size: 9px;
                padding: 2px 3px
            }

            .monthTitle {
                padding: 6px 10px
            }
        }

        /* High DPI displays */
        @media screen and (-webkit-min-device-pixel-ratio: 2),
        screen and (min-resolution: 192dpi) {
            .cal {
                border-width: 0.5px
            }

            .day {
                border-top-width: 0.5px;
                border-right-width: 0.5px
            }
        }

        /* Touch device optimizations */
        @media (hover: none) and (pointer: coarse) {

            select,
            button {
                min-height: 44px;
                padding: 10px 12px
            }

            .tag {
                min-height: 32px;
                display: flex;
                flex-direction: column;
                align-items: flex-start
            }
        }
    </style>
</head>

<body>
    <div class="calendar-container">
        <div class="wrap">
            <header>
                <img id="owuLogo" class="brandLogo" alt="OWU logo" />
                <h1 id="title">2026 Calendar of Events</h1>
                <div class="controls">
                    <label for="monthSel">Month:</label>
                    <select id="monthSel" aria-label="Select month"></select>
                    <button id="printBtn" title="Print all months">Print All Months</button>
                </div>
            </header>

            <!-- ============================================
                 CONFIGURATION: Legend/Categories
                 Customize the legend items below to match your event categories
                 ============================================ -->
            <div class="legend">
                <span class="pill"><span class="sw" style="background:var(--campus)"></span>Campus Life</span>
                <span class="pill"><span class="sw" style="background:var(--holiday)"></span>Public Holidays</span>
                <span class="pill"><span class="sw" style="background:var(--workshop)"></span>Workshops</span>
                <span class="pill"><span class="sw" style="background:var(--openday)"></span>Open Days</span>
                <span class="pill"><span class="sw" style="background:var(--micro)"></span>Micro Credential Courses</span>
                <span class="pill"><span class="sw" style="background:var(--academic)"></span>Academic</span>
            </div>

            <div id="calendar" class="cal" role="region" aria-live="polite"></div>
        </div>
    </div>

    <!-- Full event text modal (used for long entries) -->
    <div id="eventModal" class="modal" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="eventModalTitle">
            <div class="modal-header">
                <div class="modal-title" id="eventModalTitle"></div>
                <button type="button" class="modal-close" aria-label="Close">×</button>
            </div>
            <div class="modal-body" id="eventModalBody"></div>
        </div>
    </div>

    <script>
        /* ============================================
           CONFIGURATION: OWU Logo
           ============================================
           Paste your Base64 string into OWU_LOGO_BASE64 below.
           - You can paste either:
             1) Raw base64 (no prefix), OR

        /* ============================================
           UTILITIES
           ============================================ */
        const pad = n => String(n).padStart(2, "0");
        function fmtLocal(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }
        function eachDay(startStr, endStr) {
            const [ys, ms, ds] = startStr.split("-").map(Number);
            const [ye, me, de] = (endStr ?? startStr).split("-").map(Number);
            const s = new Date(ys, ms - 1, ds);
            const e = new Date(ye, me - 1, de);
            const out = [];
            for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
                out.push(fmtLocal(d));
            }
            return out;
        }
        function expand(events) {
            const map = {};
            for (const ev of events) {
                const days = eachDay(ev.start, ev.end);
                for (const day of days) {
                    (map[day] ||= []).push({ title: ev.title, category: ev.category });
                }
            }
            return map;
        }
        function daysInMonth(yyyy, mm) { return new Date(yyyy, mm, 0).getDate(); }
        function firstDow(yyyy, mm) { return new Date(yyyy, mm - 1, 1).getDay(); }

        const modalCloseBtn = document.querySelector('.modal-close');

        function cleanText(s) {
            return String(s ?? '').replace(/\s+/g, ' ').trim();
        }

        function makeSummary(fullText) {
            const cleaned = cleanText(fullText);
            if (cleaned.length <= SUMMARY_MAX) return cleaned;

            const head = cleaned.slice(0, SUMMARY_MAX);
            const lastComma = head.lastIndexOf(', ');
            const lastDash = head.lastIndexOf(' - ');
            const cutAt = Math.max(lastComma, lastDash);
            if (cutAt >= 45) {
                return `${cleaned.slice(0, cutAt + 1).trim()}…`;
            }
            return `${head.trim().replace(/[,:;!?-]\\s*$/, '')}…`;
        }

        function openEventModal(tagEl) {
            if (!eventModal) return;
            const fullText = tagEl?.dataset?.fullText ?? '';

            const endBlank = (7 - (totalCells % 7)) % 7; // Fill last row to complete 7-day week

            calEl.innerHTML = `

                        moreBtn.className = 'moreBtn';
                        moreBtn.textContent = 'Details';
                        tag.appendChild(moreBtn);

                    itemsEl.appendChild(tag);

                grid.appendChild(cell);

            // Add blank days at the end to complete the last row
            for (let i = 0; i < endBlank; i++) {
                const d = document.createElement('div'); d.className = 'day blank'; grid.appendChild(d);

        /* ============================================

        function renderMonthForPrint(monthKey) {
            const [y, m] = monthKey.split('-').map(Number);
            const events = eventsByMonth[monthKey] || [];

            return calDiv;
        }

        printBtn.addEventListener('click', () => {
            // Store original state
            const originalMonth = monthSel.value;
            const calendarContainer = document.querySelector('.calendar-container');
            const wrap = document.querySelector('.wrap');
            const body = document.body;

            // Create print wrapper
            const printWrapper = document.createElement('div');
            printWrapper.setAttribute('data-print-wrapper', 'true');
            printWrapper.className = 'print-wrapper';

            // Clone and add legend to print wrapper (so it appears in print)
            const legend = document.querySelector('.legend');
            if (legend) {
                const legendClone = legend.cloneNode(true);
                legendClone.setAttribute('data-print-legend', 'true');
                printWrapper.appendChild(legendClone);
            }

            // Generate all months
            monthKeys.forEach(monthKey => {
                const monthCal = renderMonthForPrint(monthKey);
                printWrapper.appendChild(monthCal);
            });

            // Append print wrapper inside calendar container (preferred) or wrap
            let appendTarget = calendarContainer;
            if (!appendTarget) {
                appendTarget = wrap;
            }
            if (!appendTarget) {
                appendTarget = body;
            }
            appendTarget.appendChild(printWrapper);

            // Ensure print wrapper is visible
            printWrapper.style.setProperty('display', 'block', 'important');
            printWrapper.style.setProperty('visibility', 'visible', 'important');

            // Hide original calendar
            const originalCal = document.getElementById('calendar');
            if (originalCal) {
                originalCal.classList.add('original-cal-hidden');
                originalCal.style.display = 'none';
            }

            // Hide controls and original legend (legend is cloned into print wrapper)
            const controls = document.querySelector('.controls');
            if (controls) controls.style.display = 'none';
            if (legend) legend.style.display = 'none';

            // Hide content outside calendar container (for embedded scenarios)
            const hiddenElements = [];
            if (calendarContainer) {
                // Find top-level container
                let topContainer = calendarContainer;
                let depth = 0;
                while (topContainer && topContainer.parentNode !== body && depth < 10) {
                    topContainer = topContainer.parentNode;
                    depth++;
                }

                // Ensure calendar container and all its parents are visible
                let current = calendarContainer;
                while (current && current !== body) {
                    current.style.setProperty('display', 'block', 'important');
                    current.style.setProperty('visibility', 'visible', 'important');
                    current = current.parentNode;
                }

                // Hide all body children except the calendar container tree
                if (topContainer) {
                    Array.from(body.children).forEach(el => {
                        if (el !== topContainer && !topContainer.contains(el) && !el.contains(topContainer)) {
                            const originalDisplay = window.getComputedStyle(el).display;
                            el.style.setProperty('display', 'none', 'important');
                            hiddenElements.push({ el, originalDisplay });
                        }
                    });
                }

                // Also hide common WordPress/CMS elements that might be siblings
                const cmsSelectors = [
                    'header:not(.calendar-container header)',
                    'footer:not(.calendar-container footer)',
                    'nav:not(.calendar-container nav)',
                    '.site-header:not(.calendar-container .site-header)',
                    '.site-footer:not(.calendar-container .site-footer)',
                    '.main-navigation:not(.calendar-container .main-navigation)',
                    '.wp-block-group:not(.calendar-container .wp-block-group)',
                    '.entry-header:not(.calendar-container .entry-header)',
                    '.entry-footer:not(.calendar-container .entry-footer)'
                ];

                cmsSelectors.forEach(selector => {
                    try {
                        document.querySelectorAll(selector).forEach(el => {
                            if (!calendarContainer.contains(el) && !el.contains(calendarContainer)) {
                                const originalDisplay = window.getComputedStyle(el).display;
                                el.style.setProperty('display', 'none', 'important');
                                hiddenElements.push({ el, originalDisplay });
                            }
                        });
                    } catch (e) {
                        // Ignore selector errors
                    }
                });
            }

            // Add printing class to body
            body.classList.add('calendar-printing');

            // Apply inline styles recursively to ensure visibility
            const applyStyles = (element) => {
                element.style.setProperty('visibility', 'visible', 'important');

                // Special handling for grid elements
                if (element.classList.contains('grid') || element.classList.contains('dow')) {
                    element.style.setProperty('display', 'grid', 'important');
                }
                // Special handling for flex elements
                else if (element.classList.contains('items') || element.classList.contains('day') || element.classList.contains('legend') || element.getAttribute('data-print-legend')) {
                    element.style.setProperty('display', 'flex', 'important');
                }
                // Default to block
                else {
                    element.style.setProperty('display', 'block', 'important');
                }

                Array.from(element.children).forEach(child => applyStyles(child));
            };

            applyStyles(printWrapper);

            // Inject dynamic print styles if needed
            const styleId = 'calendar-print-styles';
            let printStyle = document.getElementById(styleId);
            if (!printStyle) {
                printStyle = document.createElement('style');
                printStyle.id = styleId;
                printStyle.textContent = `
                    @media print {
                        /* Ensure colors print */
                        * {
                            -webkit-print-color-adjust: exact !important;
                            print-color-adjust: exact !important;
                        }
                        /* Hide everything by default when printing */
                        body.calendar-printing * {
                            display: none !important;
                            visibility: hidden !important;
                        }
                        /* Show only calendar container and its contents */
                        body.calendar-printing .calendar-container {
                            display: block !important;
                            visibility: visible !important;
                        }
                        body.calendar-printing .calendar-container * {
                            visibility: visible !important;
                        }
                        body.calendar-printing .calendar-container .wrap {
                            display: block !important;
                        }
                        /* Show legend in print */
                        body.calendar-printing .calendar-container .legend {
                            display: flex !important;
                            visibility: visible !important;
                            page-break-inside: avoid !important;
                            margin-bottom: 12px !important;
                            padding: 8px 0 !important;
                            border-bottom: 1px solid var(--grid) !important;
                        }
                        body.calendar-printing .calendar-container .legend .pill {
                            font-size: 10px !important;
                            gap: 6px !important;
                            white-space: nowrap !important;
                            flex-shrink: 0 !important;
                        }
                        body.calendar-printing .calendar-container .legend .sw {
                            width: 12px !important;
                            height: 12px !important;
                            -webkit-print-color-adjust: exact !important;
                            print-color-adjust: exact !important;
                            flex-shrink: 0 !important;
                        }
                        body.calendar-printing .calendar-container [data-print-wrapper] {
                            display: block !important;
                        }
                        body.calendar-printing .calendar-container [data-print-wrapper] .cal {
                            display: block !important;
                        }
                        body.calendar-printing .calendar-container [data-print-wrapper] .grid {
                            display: grid !important;
                        }
                        body.calendar-printing .calendar-container [data-print-wrapper] .dow {
                            display: grid !important;
                        }
                        body.calendar-printing .calendar-container [data-print-wrapper] .day {
                            display: flex !important;
                        }
                        body.calendar-printing .calendar-container [data-print-wrapper] .items {
                            display: flex !important;
                        }
                        /* Show legend in print wrapper */
                        body.calendar-printing .calendar-container [data-print-wrapper] [data-print-legend] {
                            display: flex !important;
                            visibility: visible !important;
                            page-break-inside: avoid !important;
                            margin-bottom: 12px !important;
                            padding: 8px 0 !important;
                            border-bottom: 1px solid var(--grid) !important;
                        }
                        body.calendar-printing .calendar-container [data-print-wrapper] [data-print-legend] .pill {
                            font-size: 10px !important;
                            gap: 6px !important;
                            white-space: nowrap !important;
                            flex-shrink: 0 !important;
                        }
                        body.calendar-printing .calendar-container [data-print-wrapper] [data-print-legend] .sw {
                            width: 12px !important;
                            height: 12px !important;
                            -webkit-print-color-adjust: exact !important;
                            print-color-adjust: exact !important;
                            flex-shrink: 0 !important;
                        }
                        body.calendar-printing .calendar-container [data-print-wrapper] .monthTitle,
                        body.calendar-printing .calendar-container [data-print-wrapper] .date,
                        body.calendar-printing .calendar-container [data-print-wrapper] .tag,
                        body.calendar-printing .calendar-container [data-print-wrapper] .day.blank {
                            display: block !important;
                        }
                        /* Hide specific elements inside calendar container */
                        body.calendar-printing .calendar-container header,
                        body.calendar-printing .calendar-container .controls,
                        body.calendar-printing .calendar-container .original-cal-hidden,
                        body.calendar-printing .calendar-container .wrap .cal:not([data-print-month]) {
                            display: none !important;
                        }
                        /* Ensure legend colors and event tag colors print correctly */
                        body.calendar-printing .calendar-container .legend .sw,
                        body.calendar-printing .calendar-container [data-print-wrapper] [data-print-legend] .sw {
                            -webkit-print-color-adjust: exact !important;
                            print-color-adjust: exact !important;
                        }
                        body.calendar-printing .calendar-container [data-print-wrapper] .tag {
                            -webkit-print-color-adjust: exact !important;
                            print-color-adjust: exact !important;
                        }
                        body.calendar-printing .calendar-container .wrap {
                            margin: 0 !important;
                            padding: 0 !important;
                        }
                        body.calendar-printing [data-print-wrapper] .cal {
                            page-break-after: always !important;
                            page-break-inside: avoid !important;
                        }
                        body.calendar-printing [data-print-wrapper] .cal:last-child {
                            page-break-after: auto !important;
                        }
                        body.calendar-printing [data-print-wrapper] .monthTitle {
                            padding: 8px 10px !important;
                            font-size: 16px !important;
                        }
                        body.calendar-printing [data-print-wrapper] .day {
                            min-height: 60px !important;
                            padding: 4px 3px 6px !important;
                        }
                        body.calendar-printing [data-print-wrapper] .date {
                            font-size: 11px !important;
                        }
                        body.calendar-printing [data-print-wrapper] .tag {
                            font-size: 9px !important;
                            padding: 3px 4px !important;
                        }
                        body.calendar-printing [data-print-wrapper] .dow {
                            padding: 6px 0 !important;
                            font-size: 11px !important;
                        }
                        body.calendar-printing [data-print-wrapper] .items {
                            gap: 2px !important;
                        }
                    }
                `;
                document.head.appendChild(printStyle);
            }

            // Cleanup function
            const cleanup = () => {
                // Remove print wrapper
                if (printWrapper.parentNode) {
                    printWrapper.parentNode.removeChild(printWrapper);
                }

                // Remove print styles
                if (printStyle && printStyle.parentNode) {
                    printStyle.parentNode.removeChild(printStyle);
                }

                // Restore hidden elements (for embedded scenarios)
                hiddenElements.forEach(({ el, originalDisplay }) => {
                    el.style.display = originalDisplay;
                });

                // Restore original calendar
                if (originalCal) {
                    originalCal.classList.remove('original-cal-hidden');
                    originalCal.style.display = '';
                }

                // Restore controls and legend
                if (controls) controls.style.display = '';
                if (legend) legend.style.display = '';

                // Remove printing class
                body.classList.remove('calendar-printing');

                // Re-render original month
                render(originalMonth);
            };

            // Handle afterprint event
            window.addEventListener('afterprint', cleanup, { once: true });

            // Fallback timeout (in case afterprint doesn't fire)
            setTimeout(() => {
                if (body.classList.contains('calendar-printing')) {
                    cleanup();
                }
            }, 1000);

            // Small delay to ensure DOM is updated before printing
            setTimeout(() => {
                window.print();
            }, 100);
        });

        // Initial render
        render(monthSel.value);
    </script>
